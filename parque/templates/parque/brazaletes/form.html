{% extends 'parque/layout/base_parque.html' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0">{{ titulo }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            {{ form.nombre }}
                            <small class="text-muted">Ej: Combo #1 o Brazalete Individual</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Cantidad de Brazaletes</label>
                            {{ form.cantidad }}
                            <small class="text-muted">Número de brazaletes que representa este item.</small>
                        </div>

                        <div class="d-flex justify-content-between border-top pt-3">
                            <a href="{% url 'parque:lista_brazaletes' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-dark px-5">Guardar Configuración</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
