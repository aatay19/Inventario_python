{% extends 'parque/layout/base_parque.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-trash3 text-danger display-1 mb-4"></i>
                    <h2 class="fw-bold mb-3">¿Eliminar producto?</h2>
                    <p class="text-muted mb-4">
                        Estás a punto de eliminar <strong>"{{ producto.nombre }}"</strong> de la lista de productos del parque.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar</button>
                            <a href="{% url 'parque:lista_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
