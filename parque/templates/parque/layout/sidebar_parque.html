    </a>

    <ul class="nav flex-column">
        <!-- Dashboard -->
        <li class="nav-item mb-2">
            <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'dashboard' %}active bg-primary rounded{% endif %}" href="{% url 'parque:dashboard' %}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>

        <li class="nav-item mb-2">

        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-danger" href="{% url 'logout' %}">
