<div id="sidebar" class="sidebar bg-dark text-white shadow">
    <div class="sidebar-header p-4 text-center border-bottom border-secondary mb-3">
        <a href="{% url 'parque:dashboard' %}" class="text-decoration-none text-white d-flex align-items-center justify-content-center">

    <ul class="nav flex-column px-2">
        <!-- Dashboard -->
        <li class="nav-item mb-1">

                <i class="bi bi-speedometer2 me-3 opacity-75"></i> Dashboard
            </a>
        </li>

        <!-- Gestión de Eventos -->
        <li class="nav-item mb-1">
            <a class="nav-link d-flex align-items-center justify-content-between dropdown-toggle px-3 py-2" href="#">

            <ul class="submenu list-unstyled ms-3 mt-1 rounded">

            </ul>
        </li>

        <li class="nav-item mb-1">

            </a>
            <ul class="submenu list-unstyled ms-3 mt-1 rounded">
                <li><a class="nav-link small py-2" href="{% url 'parque:lista_productos' %}">➤ Lista de Productos</a></li>
                <li><a class="nav-link small py-2" href="{% url 'parque:crear_producto' %}">➤ Registrar Producto</a></li>
                <li><a class="nav-link small py-2" href="{% url 'parque:lista_combos' %}">➤ Ver Combos</a></li>

        <li class="nav-item mt-4 mb-3 px-2">
            <a class="nav-link d-flex align-items-center text-danger border border-danger border-opacity-25 rounded-3 py-2 px-3 hover-logout" href="{% url 'logout' %}" style="background: rgba(220, 53, 69, 0.05);">

    .active-park { background: rgba(25, 135, 84, 0.2) !important; color: #198754 !important; border-left: 4px solid #198754; font-weight: bold; }
