{% extends 'parque/layout/base_parque.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-exclamation-triangle text-danger display-1 mb-4"></i>
                    <h2 class="fw-bold mb-3">¿Estás seguro?</h2>
                    <p class="text-muted mb-4">
                        Estás a punto de eliminar el evento <strong>"{{ evento.titulo }}"</strong> reservado por <strong>"{{ evento.nombre_reserva }}"</strong>. Esta acción no se puede deshacer.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar definitivamente</button>
                            <a href="{% url 'parque:lista_eventos' %}" class="btn btn-outline-secondary">No, cancelar y volver</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
